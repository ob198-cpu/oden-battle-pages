// ----- BATTLE -----
function renderBattle() {
  const board = document.getElementById('board');
  board.className = 'board board-battle use-board-bg';
  board.innerHTML = '';
  const highlightCells = new Set();
  const threatCells = new Set();
  const highlightType = state.selectedAction?.type || (targetingMode?.kind||null);
  let highlightClass = '';
  if (state.selectedAction?.type==='move') highlightClass = 'highlight-move';
  else if (state.selectedAction?.type==='attack') highlightClass = 'highlight-attack';
  if (state.selectedAction?.options?.cells) {
    state.selectedAction.options.cells.forEach(c=>highlightCells.add(`${c.x},${c.y}`));
  }
  if (state.selectedAction?.type==='move' && state.selectedAction?.options?.attackCells) {
    state.selectedAction.options.attackCells.forEach(c=>threatCells.add(`${c.x},${c.y}`));
  }
  if (state.peekUnitId != null) {
    const pk = findUnit(state.peekUnitId);
    if (pk && pk.alive) {
      const cells = getReachableCells(pk);
      cells.forEach(c=>highlightCells.add(`${c.x},${c.y}`));
      getMoveAttackArea(pk, cells).forEach(c=>threatCells.add(`${c.x},${c.y}`));
      highlightClass = 'highlight-move';
    }
  }
  if (targetingMode && targetingMode.candidates) {
    targetingMode.candidates.forEach(c=>highlightCells.add(`${c.x},${c.y}`));
    highlightClass = targetingMode.kind==='unit'?'highlight-attack':'highlight-skill';
  }
  if (targetingMode && targetingMode.anyCell) {
    for (let y2=0;y2<BOARD_H;y2++) for (let x2=0;x2<BOARD_W;x2++) {
      if (!unitAt(x2,y2) && !state.traps.some(t=>t.x===x2 && t.y===y2)) highlightCells.add(`${x2},${y2}`);
    }
    highlightClass = 'highlight-cell';
  }
  for (let y=0;y<BOARD_H;y++) for (let x=0;x<BOARD_W;x++) {
    const cell = document.createElement('div');
    cell.className = 'cell cell-at';
    cell.classList.add(y<4 ? 'visual-red-zone' : 'visual-blue-zone');
    cell.dataset.x = String(x);
    cell.dataset.y = String(y);
    if (y>=BOARD_H-3) cell.classList.add('p1zone');
    if (y<3) cell.classList.add('p2zone');
    const key = `${x},${y}`;
    if (threatCells.has(key) && !highlightCells.has(key)) cell.classList.add('highlight-threat');
    if (highlightCells.has(key)) cell.classList.add(highlightClass);
    // traps
    if (state.traps.some(t=>t.x===x && t.y===y)) {
      const s=document.createElement('div'); s.className='slash'; cell.appendChild(s);
    }
    const u = unitAt(x,y);
    if (u) {
      const udiv = document.createElement('div');
      udiv.className = 'unit '+(u.owner===0?'p1':'p2');
      const psrc = portraitSrc(u.charId);
      if (psrc) udiv.classList.add('has-face');
      if (u.moved && u.acted) udiv.classList.add('acted');
      if (state.currentUnit===u.id) udiv.classList.add('current');
      if (!u.alive) udiv.classList.add('dead');
      const face = psrc ? `<img class="unit-face" src="${psrc}" alt="" draggable="false"><div class="unitshade"></div>` : '';
      udiv.innerHTML = `${face}
        <div class="uname">${u.name}</div>
        <div class="hpbar"><div style="width:${(u.hp/u.maxHp)*100}%"></div></div>
        <div class="ougi">AP${u.ap}</div>
        <div class="effects">${renderEffectBadges(u)}</div>
      `;
      udiv.onclick = (e)=>{ e.stopPropagation(); selectUnit(u); };
      udiv.onmouseenter = (e)=>showTooltip(e, u.char, u);
      udiv.onmousemove = (e)=>moveTooltip(e);
      udiv.onmouseleave = hideTooltip;
      cell.appendChild(udiv);
    }
    cell.onclick = ()=>selectCellClick(x,y);
    board.appendChild(cell);
  }
  document.getElementById('action-panel').style.display = 'none';
  if (state.peekUnitId != null) {
    const pk = findUnit(state.peekUnitId);
    if (pk) showUnitInfo(pk);
    else {
      document.getElementById('battle-basic-info').textContent = '敵情報';
      document.getElementById('unit-info').textContent = '';
    }
  } else if (state.currentUnit) {
    const ub = findUnit(state.currentUnit);
    if (ub) showUnitInfo(ub);
  } else {
    document.getElementById('battle-basic-info').innerHTML =
      '<span class="dim" style="font-size:13px;line-height:1.5;">味方または敵をクリックしてください。アクションと移動範囲が表示されます。</span>';
    document.getElementById('unit-info').innerHTML = '';
  }
  requestAnimationFrame(()=>{ updateBattleFloatingUI(); refreshCancelStrip(); });
}

function renderEffectBadges(u) {
  const tags=[];
  const eff = u.effects;
  const map = { immobilize:'移不', paralyze:'麻痺', heavyWound:'重', injured:'負', stealth:'潜', pierce:'刺',
    doomed:'死', hot:'回', healNext:'回', damageCut:'C', brigant:'ブ', damageBuff:'+', tensinBuff:'神',
    protected:'ユ', endure1:'耐', mvBuff:'速', shield:'盾', immuneNext:'免', delayedKill:'死予' };
  eff.forEach(e=>{ if (map[e.type]) tags.push(`<span class="eff">${map[e.type]}</span>`); });
  if (u.luckyUsed===false && u.charId===14) tags.push('<span class="eff">幸</span>');
  return tags.join('');
}

function showUnitInfo(u) {
  const info = document.getElementById('unit-info');
  const basic = document.getElementById('battle-basic-info');
  const c = u.char;
  const pis = portraitSrc(u.charId);
  const ip = pis ? `<img class="info-portrait" src="${pis}" alt="">`: '';
  const rangeText = `${u.range[0]}${u.range[1]!==u.range[0]?'〜'+u.range[1]:''}`;
  const icon = (name) => `<img class="ui-icon" src="img/icons/${name}.png?v=20260501" alt="">`;
  const moveIcon = u.moved ? 'action-ng' : 'move-ok';
  const actionIcon = u.acted ? 'action-ng' : 'action-ok';
  if (basic) basic.innerHTML = `
    ${ip}
    <div style="font-weight:bold;font-size:16px;line-height:1.3">${u.name}</div>
    <div class="dim">${c.affil||''} / ${c.role}</div>
    <div class="stat-row">
      <span class="stat-pill">${icon('hp')}HP ${u.hp}/${u.maxHp}</span>
      <span class="stat-pill">${icon('ap')}AP <b style="color:var(--gold)">${u.ap}</b></span>
    </div>
    <div class="bar hp"><div style="width:${(u.hp/u.maxHp)*100}%"></div></div>
    <div class="dim battle-move-range">移動${u.move} / 射程${rangeText}</div>
  `;
  info.innerHTML = '';
}
function renderActionPanel() {
  const d = document.getElementById('action-panel');
  if (d) d.style.display = 'none';
}
function renderLog() {
  const box = document.getElementById('log');
  if (!box) return;
  box.innerHTML = state.log.slice(-50).map(l=>`<div class="line ${l.cls}">${l.msg}</div>`).join('');
  box.scrollTop = box.scrollHeight;
}

// ----- TOOLTIP -----
function showTooltip(e, c, unit) {
  const tip = document.getElementById('tooltip');
  const inBattleGrid = !!(unit && document.getElementById('screen-battle')?.classList.contains('active'));
  if (inBattleGrid) {
    hideTooltip();
    return;
  }
  const tp = portraitSrc(c.id);
  const head = tp ? `<img class="t-portrait" src="${tp}" alt="">`:'';
  tip.innerHTML = `
    <div class="tooltip-flex">
      ${head}
      <div class="t-body">
        <div class="t-name">${c.name}</div>
        <div class="dim">${c.affil||''} / ${c.role}</div>
        <div class="t-sec"><span class="t-label">スキル:</span> ${c.skill?.name||'-'}<br><span class="dim">${c.skill?.desc||''}</span></div>
        <div class="t-sec"><span class="t-label">奥義:</span> ${c.ougi?.name||'-'}<br><span class="dim">${c.ougi?.desc||''}</span></div>
        <div class="t-sec"><span class="t-label">センス:</span> ${c.sense?.name||'-'}<br><span class="dim">${c.sense?.desc||''}</span></div>
        <div class="t-sec dim" style="font-style:italic">${c.quote||''}</div>
      </div>
    </div>
  `;
  tip.classList.add('active');
  moveTooltip(e);
}
function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  const x = Math.min(window.innerWidth-340, e.clientX+16);
  const y = Math.min(window.innerHeight-240, e.clientY+16);
  tip.style.left = x+'px';
  tip.style.top = y+'px';
}
function hideTooltip(){ document.getElementById('tooltip').classList.remove('active'); }

function showHelp() {
  document.getElementById('modal-title').textContent = 'ルール説明';
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:left">
      <ul style="line-height:1.6">
        <li>8×8 の盤面で 5体 vs 5体 のバトル</li>
        <li>各プレイヤーのターン開始時に、自軍各キャラに <b>+1AP</b>（行動ポイント）付与</li>
        <li>各キャラは1ターンに <b>移動1回</b>（AP消費なし）と、以下のいずれか1回:<br>
          ・通常攻撃 [1AP] / スキル [2AP] / 奥義 [3AP]</li>
        <li>AP は使わなければ蓄積される（次ターンに +1）</li>
        <li>センスは常時発動（パッシブ）</li>
        <li><strong>Esc</strong> または下部のキャンセルで、移動／攻撃／スキル・奥義の入力をキャンセルできます（効果適用前はAPを消費しません）</li>
        <li>相手チームを全滅させたら勝利</li>
      </ul>
    </div>
  `;
  document.getElementById('modal').classList.add('active');
}
function closeModal() { document.getElementById('modal').classList.remove('active'); }

// Init
document.addEventListener('keydown', (e)=>{
  if (e.key !== 'Escape') return;
  if (!document.getElementById('screen-battle')?.classList.contains('active')) return;
  if (document.getElementById('modal')?.classList.contains('active')) return;
  battleCancelSelection();
});
window.addEventListener('resize', ()=>{
  if (!state) return;
  if (!document.getElementById('screen-battle')?.classList.contains('active')) return;
  const u = state.currentUnit ? findUnit(state.currentUnit) :
    (state.peekUnitId != null ? findUnit(state.peekUnitId) : null);
  if (u) positionBattleFloatForUnit(u);
});
showScreen('screen-title');
// ===== BGM =====
let bgmStarted = false;
let bgmMuted = false;
const bgm = document.getElementById('bgm');
bgm.volume = 0.45;

function startBGM() {
  if (bgmStarted || bgmMuted) return;
  bgm.play().then(()=>{ bgmStarted = true; }).catch(()=>{});
}
let volWrapVisible = false;
function toggleBGM() {
  const btn = document.getElementById('bgm-btn');
  const volWrap = document.getElementById('vol-wrap');
  if (bgmMuted) {
    bgmMuted = false;
    bgm.volume = document.getElementById('vol-slider').value / 100;
    if (!bgmStarted) startBGM();
    else bgm.play().catch(()=>{});
    btn.textContent = '🔊';
    volWrap.style.display = 'flex';
    volWrapVisible = true;
  } else {
    // 2回目クリック：スライダー表示中→非表示、非表示→ミュート
    if (volWrapVisible) {
      volWrap.style.display = 'none';
      volWrapVisible = false;
    } else {
      bgmMuted = true;
      bgm.pause();
      btn.textContent = '🔇';
    }
  }
}
function setBGMVol(val) {
  bgm.volume = val / 100;
  const btn = document.getElementById('bgm-btn');
  if (val == 0) {
    bgmMuted = true;
    bgm.pause();
    btn.textContent = '🔇';
  } else {
    if (bgmMuted) {
      bgmMuted = false;
      if (bgmStarted) bgm.play().catch(()=>{});
      btn.textContent = '🔊';
    }
  }
}
// 最初のユーザー操作で自動再生開始
document.addEventListener('click', function handler() {
  startBGM();
  document.removeEventListener('click', handler);
}, { once: true });
</script>
